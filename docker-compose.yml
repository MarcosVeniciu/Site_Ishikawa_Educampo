services:
  frontend:
    container_name: site_ishikawa_educampo
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    # O Docker vai ler o seu ficheiro .env local e injetar no contentor
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - API_BASE_URL=http://host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ishikawa_network

networks:
  ishikawa_network:
    driver: bridge